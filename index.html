    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {

            min-height: 100vh;

        }
        .container {

        }
        .glass-card {

            padding: 50px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; opacity: 0.8; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-family: 'Inter', sans-serif;
        }
        input:focus, select:focus { outline: none; border-color: #38bdf8; }
        option { background: #1e293b; color: white; }
        
        button {
            width: 100%;
            background: #38bdf8;
            color: #0f172a;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 10px;
        }
        button:hover { transform: scale(1.02); background: #7dd3fc; }
        
        .founders-note {
            background: rgba(0, 0, 0, 0.2);
            padding: 30px;
            border-radius: 16px;
            border-left: 4px solid #38bdf8;
        }
        .founders-note h3 { margin-bottom: 15px; color: #38bdf8; }
        .founders-note p { line-height: 1.6; opacity: 0.9; margin-bottom: 15px; }
        
        .legal-footer {
            text-align: center;
            font-size: 0.75rem;
            opacity: 0.5;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
        }
        
        @media (max-width: 600px) {
            .glass-card { padding: 30px 20px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
